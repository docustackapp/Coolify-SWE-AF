services:
  control-plane:
    image: ghcr.io/agent-field/agentfield-control-plane:latest
    environment:
      - AGENTFIELD_HTTP_ADDR=0.0.0.0:8080
      - AGENTFIELD_STORAGE_MODE=local
    volumes:
      - agentfield-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  swe-agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - AGENTFIELD_SERVER=http://control-plane:8080
      - NODE_ID=swe-planner
      - PORT=8003
      - AGENT_CALLBACK_URL=http://swe-agent:8003
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - GH_TOKEN=${GH_TOKEN}
    volumes:
      - workspaces:/workspaces
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  agentfield-data:
  workspaces:
